{% extends "base.html" %}

{% block title %}Offline — JobHunt{% endblock %}

{% block content %}
<div class="card animate-fade-in mx-auto mt-16 max-w-md p-8 text-center">
  <div class="mx-auto flex h-14 w-14 items-center justify-center rounded-2xl bg-brand-50 text-brand-500 dark:bg-brand-950/60 dark:text-brand-400">
    <svg class="h-7 w-7" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M18.364 5.636a9 9 0 010 12.728m0 0l-2.829-2.829m2.829 2.829L21 21M15.536 8.464a5 5 0 010 7.072m0 0l-2.829-2.829m-4.243 2.829a4.978 4.978 0 01-1.414-2.83m-1.414 5.658a9 9 0 01-2.167-9.238m7.824 2.167a1 1 0 111.414 1.414m-1.414-1.414L3 3"/></svg>
  </div>
  <h1 class="mt-4 text-xl font-bold text-slate-900 dark:text-white">You're offline</h1>
  <p class="mt-1.5 text-sm text-slate-500 dark:text-slate-400">
    No connection right now. Pages you've visited before are still available from the cache —
    everything else will be back once you're online.
  </p>
  <a href="/" class="btn-primary mt-5">Try again</a>
</div>
{% endblock %}
